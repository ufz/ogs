check web links:
  stage: check
  allow_failure: true
  tags: [envinf, shell]
  extends:
    - .rules-master-manual
  needs:
    - job: meta
    - job: "build linux arch"
      parallel:
        matrix:
          - OGS_COVERAGE_PYTHON: "OFF"
            ADDITIONAL_TARGETS: "feature_matrix"
            CTEST_ARGS: ""
    - job: "build linux petsc"
      parallel:
        matrix:
          - OGS_COVERAGE_PYTHON: "OFF"
            ADDITIONAL_TARGETS: ""
            CTEST_ARGS: -L default|petsc-mumps
  image: $WEB_IMAGE
  script:
    # Copy notebook pages
    - cp -rl build/*/web/content web/
    - cd web
    - yarn
    - yarn index
    - hugo
    - lychee --config ./lychee.toml --cache --max-cache-age 2d --threads ${CTEST_PARALLEL_LEVEL:-4} --root-dir public public
    # - lychee --config ./lychee-gitlab.toml --cache --max-cache-age 14d --max-concurrency 2 public
  cache:
    paths:
      - web/.lycheecache
