check web links:
  stage: check
  allow_failure: true
  tags: [envinf, shell]
  extends:
    - .rules-master-manual
  needs: [meta, "build linux arch", "build linux petsc"]
  script:
    - !reference [.web-setup, script]
    - lychee --config web/lychee.toml --cache --max-cache-age 2d --threads ${CTEST_PARALLEL_LEVEL:-4} --root-dir $build_dir_full/web/public $build_dir_full/web/public
    # - lychee --config ./lychee-gitlab.toml --cache --max-cache-age 14d --max-concurrency 2 public
  cache:
    paths:
      - build/release/web/.lycheecache
