.common-linux-arch-base: &common-linux-arch-base
  extends:
    - .template-build-linux
    - .test-artifacts
  needs: [meta]
  timeout: 3h
  variables:
    BUILD_CTEST_LARGE_ON_MASTER: "true"

# Rules for OGS_COVERAGE_PYTHON=OFF
.common-arch-cpp-rules: &common-arch-cpp-rules
  - if: '$CI_MERGE_REQUEST_LABELS =~ /.*ci::coverage only?($|,)/'
    when: never
  - if: '$CI_MERGE_REQUEST_LABELS =~ /.*ci::web only?($|,)/'
    variables:
      CTEST_ARGS: "-R nb-"
  - when: on_success

# Rules for OGS_COVERAGE_PYTHON=ON
.common-arch-python-rules: &common-arch-python-rules
  - if: '$CI_MERGE_REQUEST_LABELS =~ /.*ci::web only?($|,)/'
    when: never
  - when: on_success

.common-linux-arch-before-script: &common-linux-arch-before-script
  - source /opt/intel/oneapi/setvars.sh

# ============================================================
# Serial, separate job for python coverage necessary
# ============================================================

build linux arch:
  <<: *common-linux-arch-base
  tags: [shell, envinf]
  rules: *common-arch-cpp-rules
  variables:
    CMAKE_PRESET: release-all
    CMAKE_ARGS: "-DOGS_USE_MKL=ON -DOGS_USE_NETCDF=ON"
    ADDITIONAL_TARGETS_PRE: "check-headers"
    ADDITIONAL_TARGETS_POST: "feature_matrix"
  before_script: *common-linux-arch-before-script
  allow_failure:
    # Triggered by feature matrix feature_coverage
    exit_codes: 123

build linux arch (py-cov):
  <<: *common-linux-arch-base
  tags: [shell, envinf]
  rules: *common-arch-python-rules
  variables:
    CMAKE_PRESET: release-all
    CMAKE_ARGS: "-DOGS_USE_MKL=ON -DOGS_USE_NETCDF=ON -DOGS_COVERAGE_PYTHON=ON"
    ADDITIONAL_TARGETS_POST: "process_coverage_python"
    CTEST_ARGS: "-R nb-|pytest"
  before_script: *common-linux-arch-before-script

# ============================================================
# PETSc, separate job for python coverage necessary
# ============================================================

build linux petsc:
  <<: *common-linux-arch-base
  tags: [envinf, shell, petsc]
  rules: *common-arch-cpp-rules
  variables:
    CMAKE_PRESET: release-petsc
    CMAKE_ARGS: "-DOGS_USE_PIP=ON -DOGS_USE_MFRONT=ON"
    ADDITIONAL_TARGETS_PRE: "check-headers"
    ADDITIONAL_TARGETS_POST: ""
    CTEST_ARGS: "-L default|petsc-mumps"
  before_script: *common-linux-arch-before-script

build linux petsc (py-cov):
  <<: *common-linux-arch-base
  tags: [envinf, shell, petsc]
  rules: *common-arch-python-rules
  variables:
    CMAKE_PRESET: release-petsc
    CMAKE_ARGS: "-DOGS_USE_PIP=ON -DOGS_USE_MFRONT=ON -DOGS_COVERAGE_PYTHON=ON"
    ADDITIONAL_TARGETS_POST: "process_coverage_python"
    CTEST_ARGS: "-R nb-|pytest"
  before_script: *common-linux-arch-before-script

# ============================================================
# LIS
# ============================================================
build linux arch lis:
  <<: *common-linux-arch-base
  tags: [shell, envinf]
  rules: *common-arch-cpp-rules
  variables:
    CMAKE_PRESET: release-all
    CMAKE_ARGS: "-DOGS_USE_LIS=ON"
