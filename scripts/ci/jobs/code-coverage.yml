code coverage:
  stage: check
  tags: [shell, envinf]
  needs: [meta]
  variables:
    CMAKE_PRESET: coverage
    BUILD_TESTS: true
    BUILD_CTEST: false
    CMAKE_ARGS: >-
      -DOGS_USE_PIP=ON
  script:
    - !reference [.template-build-linux, script]
    - cmake --build --preset $CMAKE_PRESET -t ctest
    - cmake --build --preset $CMAKE_PRESET -t process_coverage
  after_script:
    - ln -s ../../build/coverage build/coverage
  artifacts:
    when: always
    paths:
      - build/coverage/coverage/cpp-coverage.xml
      - build/coverage/logs/*.txt
    expire_in: 1 week
